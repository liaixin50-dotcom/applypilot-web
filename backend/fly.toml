# ApplyPilot Backend — Fly.io deployment config
# Usage:
#   cd web_app/backend
#   fly launch --name applypilot-api
#   fly deploy

app = "applypilot-api"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  APPLYPILOT_DIR = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
    force_https = true

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[services.tcp_checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "10s"

[[vm]]
  cpu_kind = "shared-cpu-1x"
  cpus = 1
  memory_mb = 256

[mounts]
  source = "applypilot_data"
  destination = "/data"
